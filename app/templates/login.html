<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – RPG Forge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo-icon">⚔️</span>
      <h1 class="auth-title">RPG Forge</h1>
      <p class="auth-subtitle">Sua plataforma de personagens</p>
    </div>

    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
      <div class="alert alert-{{ 'danger' if cat == 'error' else cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" class="auth-form">
      <div class="form-group">
        <label class="form-label">Usuário</label>
        <input type="text" name="username" class="form-input" required autofocus placeholder="Seu usuário">
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" name="password" class="form-input" required placeholder="Sua senha">
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Entrar</button>
    </form>

    <p class="auth-switch">Não tem conta? <a href="{{ url_for('registrar') }}">Criar conta</a></p>
  </div>
</div>

<style>
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:1rem}
.auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:400px;box-shadow:var(--shadow)}
.auth-logo{text-align:center;margin-bottom:2rem}
.auth-logo-icon{font-size:3rem;display:block;margin-bottom:.5rem}
.auth-title{font-family:'Cinzel',serif;font-size:1.8rem;margin:0 0 .25rem;color:var(--accent-light)}
.auth-subtitle{font-size:.9rem;color:var(--text-muted);margin:0}
.auth-form{display:flex;flex-direction:column;gap:1rem;margin-bottom:1.25rem}
.auth-switch{text-align:center;font-size:.88rem;color:var(--text-muted);margin:0}
.auth-switch a{color:var(--accent-light);text-decoration:none}
.auth-switch a:hover{text-decoration:underline}
</style>
</body>
</html>
